<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Universal Media Extractor</title>
    <style>
        :root {
            --accent: #007aff;
            --bg: #0f0f0f;
            --card: #1a1a1a;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .glass-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #333;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .progress-container {
            width: 100%;
            background: #333;
            height: 6px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        #status {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <h2>Extractor</h2>
        <input type="text" id="url" placeholder="Paste link (YouTube, TikTok, etc.)">
        <select id="resolution">
            <option value="2160">4K (2160p)</option>
            <option value="1080" selected>1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
        </select>
        <button id="download-btn">Download Media</button>

        <div class="progress-container" id="p-container">
            <div id="progress-bar"></div>
        </div>
        <div id="status">Ready</div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
